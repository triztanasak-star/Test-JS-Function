<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tính Tiền Cáp độc lập</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body class="bg-transparent"> <div class="container w-100 py-3">
        <div class="card p-4 shadow rounded bg-light">
            <h2 class="text-center mb-4 text-primary fw-bold">Bài Tập: Tính Tiền Cáp</h2>
            <div class="mb-3">
                <label for="maKH" class="form-label fw-bold">Mã khách hàng</label>
                <input id="maKH" type="text" class="form-control" placeholder="Ví dụ: KH-001">
            </div>
            <div class="mb-3">
                <label for="loaiKH" class="form-label fw-bold">Loại khách hàng</label>
                <select id="loaiKH" class="form-select">
                    <option value="nhanDan">Nhà dân</option>
                    <option value="doanhNghiep">Doanh nghiệp</option>
                </select>
            </div>
            <div class="mb-3" id="groupKetNoi">
                <label for="soKetNoi" class="form-label fw-bold text-muted">Số kết nối (Chỉ dành cho Doanh nghiệp)</label>
                <input id="soKetNoi" type="number" class="form-control" placeholder="Nhập số kết nối" disabled value="0">
            </div>
            <div class="mb-4">
                <label for="soKenh" class="form-label fw-bold">Số kênh cao cấp</label>
                <input id="soKenh" type="number" class="form-control" placeholder="Nhập số kênh" value="0">
            </div>
            <div class="d-grid mb-4">
                <button id="btnTinhTienCap" class="btn btn-primary text-white fw-bold" type="button">TÍNH TIỀN CÁP</button>
            </div>
            <div id="txtKetQua1" class="alert alert-primary d-none text-center fw-bold fs-5 shadow-sm rounded">
                Kết quả sẽ hiển thị tại đây!
            </div>
        </div>
    </div>

    <script src="./js/tiencap.js"></script>
</body>
</html>
